name: Release

on:
  push:
    tags:
      - "v*.*.*"
  workflow_dispatch:
    inputs:
      tag_name:
        description: "Release tag, for example v0.1.0"
        required: true
        type: string
      prerelease:
        description: "Mark the GitHub release as a prerelease"
        required: false
        default: false
        type: boolean
      draft:
        description: "Create the GitHub release as a draft"
        required: false
        default: false
        type: boolean

permissions:
  contents: read

concurrency:
  group: release-${{ github.event.inputs.tag_name || github.ref_name }}
  cancel-in-progress: false

env:
  APP_NAME: market-sentinel
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: "true"
  PIP_DISABLE_PIP_VERSION_CHECK: "1"
  PYTHONUNBUFFERED: "1"

jobs:
  metadata:
    name: Release metadata
    runs-on: ubuntu-latest
    timeout-minutes: 5
    outputs:
      tag_name: ${{ steps.release.outputs.tag_name }}
      version: ${{ steps.release.outputs.version }}
      prerelease: ${{ steps.release.outputs.prerelease }}
      draft: ${{ steps.release.outputs.draft }}
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Resolve release inputs
        id: release
        shell: bash
        run: |
          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            tag_name="${{ inputs.tag_name }}"
            prerelease="${{ inputs.prerelease }}"
            draft="${{ inputs.draft }}"
          else
            tag_name="${GITHUB_REF_NAME}"
            if [[ "${tag_name}" == *-* ]]; then
              prerelease="true"
            else
              prerelease="false"
            fi
            draft="false"
          fi

          if ! [[ "${tag_name}" =~ ^v[0-9]+\.[0-9]+\.[0-9]+([-.][0-9A-Za-z.-]+)?$ ]]; then
            echo "Release tag must look like v1.2.3 or v1.2.3-rc.1; got ${tag_name}" >&2
            exit 1
          fi

          echo "tag_name=${tag_name}" >> "${GITHUB_OUTPUT}"
          echo "version=${tag_name#v}" >> "${GITHUB_OUTPUT}"
          echo "prerelease=${prerelease}" >> "${GITHUB_OUTPUT}"
          echo "draft=${draft}" >> "${GITHUB_OUTPUT}"

      - name: Validate package version matches release tag
        env:
          RELEASE_VERSION: ${{ steps.release.outputs.version }}
        shell: bash
        run: |
          python - <<'PY'
          import os
          from pathlib import Path
          import tomllib

          expected = os.environ["RELEASE_VERSION"]
          actual = tomllib.loads(Path("pyproject.toml").read_text(encoding="utf-8"))["project"]["version"]
          if actual != expected:
              raise SystemExit(
                  f"pyproject.toml project.version is {actual}, but the release tag is {expected}. "
                  "Update [project].version before publishing this release."
              )
          PY

  python-compatibility:
    name: Python compatibility ${{ matrix.python-version }} / ${{ matrix.os }}
    runs-on: ${{ matrix.os }}
    timeout-minutes: 30
    needs: metadata
    strategy:
      fail-fast: false
      matrix:
        os:
          - ubuntu-latest
          - macos-latest
          - windows-latest
        python-version:
          - "3.10"
          - "3.11"
          - "3.12"
          - "3.13"
          - "3.14"
          - "3.x"
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: ${{ matrix.python-version }}
          cache: pip
          cache-dependency-path: |
            requirements.txt
            pyproject.toml

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          python -m pip install -r requirements.txt
          python -m pip install -e .

      - name: Verify Python and Tkinter fallback
        run: |
          python app.py --smoke-test
          python verify.py

  python-dist:
    name: Verify and build Python package
    runs-on: ubuntu-latest
    timeout-minutes: 30
    needs: metadata
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.14"
          cache: pip
          cache-dependency-path: |
            requirements.txt
            pyproject.toml

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          python -m pip install -r requirements.txt
          python -m pip install -e .
          python -m pip install build

      - name: Verify Python and Tkinter fallback
        run: |
          python app.py --smoke-test
          python verify.py

      - name: Build Python distributions
        run: python -m build

      - name: Upload Python distributions
        uses: actions/upload-artifact@v7
        with:
          name: python-dist
          path: dist/*
          if-no-files-found: error
          retention-days: 14

  frontend-dist:
    name: Build React production bundle
    runs-on: ubuntu-latest
    timeout-minutes: 20
    needs: metadata
    defaults:
      run:
        working-directory: frontend
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Set up Node.js
        uses: actions/setup-node@v6
        with:
          node-version: "24"

      - name: Install frontend dependencies
        shell: bash
        run: |
          if [ -f package-lock.json ]; then
            npm ci
          else
            npm install --no-audit --no-fund
          fi

      - name: Build React frontend
        run: npm run build

      - name: Create frontend zip
        shell: bash
        run: |
          python - <<'PY'
          from pathlib import Path
          from zipfile import ZIP_DEFLATED, ZipFile

          root = Path("dist")
          out = Path("../release-frontend-dist.zip")
          with ZipFile(out, "w", ZIP_DEFLATED) as archive:
              for path in sorted(root.rglob("*")):
                  if path.is_file():
                      archive.write(path, path.relative_to(root).as_posix())
          PY

      - name: Upload frontend distribution
        uses: actions/upload-artifact@v7
        with:
          name: frontend-dist-zip
          path: release-frontend-dist.zip
          if-no-files-found: error
          retention-days: 14

  windows-app:
    name: Build Windows EXE and MSI
    runs-on: windows-latest
    timeout-minutes: 45
    needs:
      - metadata
      - frontend-dist
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.13"
          cache: pip
          cache-dependency-path: |
            requirements.txt
            requirements-build.txt
            pyproject.toml

      - name: Download frontend bundle
        uses: actions/download-artifact@v8
        with:
          name: frontend-dist-zip
          path: release-inputs

      - name: Install Python build dependencies
        shell: pwsh
        run: |
          python -m pip install --upgrade pip
          python -m pip install -r requirements.txt
          python -m pip install -e .
          python -m pip install -r requirements-build.txt

      - name: Install WiX Toolset
        shell: pwsh
        run: |
          $toolPath = "$env:USERPROFILE\.dotnet\tools"
          $env:PATH = "$toolPath;$env:PATH"
          $installedTools = dotnet tool list --global
          if ($installedTools -match '^\s*wix\s+') {
            dotnet tool uninstall --global wix
          }
          dotnet tool install --global wix --version 6.0.2
          $toolPath | Out-File -FilePath $env:GITHUB_PATH -Encoding utf8 -Append
          $wixVersion = wix --version
          if (-not ($wixVersion -like "6.0.2*")) {
            throw "Expected WiX Toolset 6.0.2, got $wixVersion"
          }
          $wixVersion

      - name: Build Windows portable zip and MSI
        shell: pwsh
        run: |
          python scripts/build_windows_release.py `
            --version "${{ needs.metadata.outputs.version }}" `
            --tag "${{ needs.metadata.outputs.tag_name }}" `
            --frontend-zip "release-inputs/release-frontend-dist.zip" `
            --output-dir "release-assets"

      - name: Upload Windows release packages
        uses: actions/upload-artifact@v7
        with:
          name: windows-dist
          path: release-assets/*
          if-no-files-found: error
          retention-days: 14

  publish:
    name: Publish GitHub release
    runs-on: ubuntu-latest
    timeout-minutes: 15
    needs:
      - metadata
      - python-compatibility
      - python-dist
      - frontend-dist
      - windows-app
    environment: release
    permissions:
      contents: write
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Download Python distributions
        uses: actions/download-artifact@v8
        with:
          name: python-dist
          path: release-assets

      - name: Download frontend bundle
        uses: actions/download-artifact@v8
        with:
          name: frontend-dist-zip
          path: release-assets

      - name: Download Windows packages
        uses: actions/download-artifact@v8
        with:
          name: windows-dist
          path: release-assets

      - name: Normalize release asset names
        shell: bash
        run: |
          tag="${{ needs.metadata.outputs.tag_name }}"
          mv release-assets/release-frontend-dist.zip "release-assets/${APP_NAME}-${tag}-frontend-dist.zip"

      - name: Generate checksums and release notes
        shell: bash
        run: |
          tag="${{ needs.metadata.outputs.tag_name }}"
          version="${{ needs.metadata.outputs.version }}"
          (
            cd release-assets
            sha256sum * > SHA256SUMS.txt
          )
          cat > RELEASE_NOTES.md <<EOF
          ## ${APP_NAME} ${version}

          Automated release for \`${tag}\`.

          Verification performed in this workflow:
          - Python dependency installation and package import checks across Python 3.10 and newer, including the latest stable 3.x runner where available
          - Tkinter fallback smoke test
          - Full \`python verify.py\`
          - React production build
          - Python wheel/sdist build
          - Windows executable, portable zip, and MSI installer build
          - SHA256 checksum generation

          Assets:
          - Python wheel and source distribution
          - React production frontend zip
          - Windows x64 portable zip
          - Windows x64 MSI installer
          - \`SHA256SUMS.txt\`
          EOF

      - name: Publish or update GitHub release
        env:
          GH_TOKEN: ${{ github.token }}
          TAG_NAME: ${{ needs.metadata.outputs.tag_name }}
          PRERELEASE: ${{ needs.metadata.outputs.prerelease }}
          DRAFT: ${{ needs.metadata.outputs.draft }}
        shell: bash
        run: |
          release_flags=()
          if [ "${PRERELEASE}" = "true" ]; then
            release_flags+=(--prerelease)
          fi
          if [ "${DRAFT}" = "true" ]; then
            release_flags+=(--draft)
          fi

          if gh release view "${TAG_NAME}" >/dev/null 2>&1; then
            gh release upload "${TAG_NAME}" release-assets/* --clobber
            gh release edit "${TAG_NAME}" --title "${TAG_NAME}" --notes-file RELEASE_NOTES.md "${release_flags[@]}"
          else
            gh release create "${TAG_NAME}" release-assets/* \
              --title "${TAG_NAME}" \
              --notes-file RELEASE_NOTES.md \
              --target "${GITHUB_SHA}" \
              "${release_flags[@]}"
          fi
