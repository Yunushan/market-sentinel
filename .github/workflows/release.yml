name: Release

on:
  push:
    tags:
      - "v*.*.*"
  workflow_dispatch:
    inputs:
      tag_name:
        description: "Release tag, for example v0.1.0"
        required: true
        type: string
      prerelease:
        description: "Mark the GitHub release as a prerelease"
        required: false
        default: false
        type: boolean
      draft:
        description: "Create the GitHub release as a draft"
        required: false
        default: false
        type: boolean

permissions:
  contents: read

concurrency:
  group: release-${{ github.event.inputs.tag_name || github.ref_name }}
  cancel-in-progress: false

env:
  APP_NAME: market-sentinel
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: "true"
  PIP_DISABLE_PIP_VERSION_CHECK: "1"
  PIP_NO_CACHE_DIR: "1"
  PYTHONUNBUFFERED: "1"

jobs:
  metadata:
    name: Release metadata
    runs-on: ubuntu-latest
    timeout-minutes: 5
    outputs:
      tag_name: ${{ steps.release.outputs.tag_name }}
      version: ${{ steps.release.outputs.version }}
      prerelease: ${{ steps.release.outputs.prerelease }}
      draft: ${{ steps.release.outputs.draft }}
    steps:
      - name: Checkout
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7
        with:
          fetch-depth: 0

      - name: Resolve release inputs
        id: release
        shell: bash
        run: |
          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            tag_name="${{ inputs.tag_name }}"
            prerelease="${{ inputs.prerelease }}"
            draft="${{ inputs.draft }}"
          else
            tag_name="${GITHUB_REF_NAME}"
            if [[ "${tag_name}" == *-* ]]; then
              prerelease="true"
            else
              prerelease="false"
            fi
            draft="false"
          fi

          if ! [[ "${tag_name}" =~ ^v[0-9]+\.[0-9]+\.[0-9]+([-.][0-9A-Za-z.-]+)?$ ]]; then
            echo "Release tag must look like v1.2.3 or v1.2.3-rc.1; got ${tag_name}" >&2
            exit 1
          fi

          echo "tag_name=${tag_name}" >> "${GITHUB_OUTPUT}"
          echo "version=${tag_name#v}" >> "${GITHUB_OUTPUT}"
          echo "prerelease=${prerelease}" >> "${GITHUB_OUTPUT}"
          echo "draft=${draft}" >> "${GITHUB_OUTPUT}"

      - name: Validate package version matches release tag
        env:
          RELEASE_VERSION: ${{ steps.release.outputs.version }}
        shell: bash
        run: |
          python - <<'PY'
          import os
          from pathlib import Path
          import tomllib

          expected = os.environ["RELEASE_VERSION"]
          actual = tomllib.loads(Path("pyproject.toml").read_text(encoding="utf-8"))["project"]["version"]
          if actual != expected:
              raise SystemExit(
                  f"pyproject.toml project.version is {actual}, but the release tag is {expected}. "
                  "Update [project].version before publishing this release."
              )
          PY

      - name: Require release commit to be reachable from protected main
        shell: bash
        run: |
          git fetch --no-tags origin main
          if ! git merge-base --is-ancestor "${GITHUB_SHA}" "origin/main"; then
            echo "Release commit ${GITHUB_SHA} is not reachable from origin/main." >&2
            echo "Publish releases only from a commit already merged to protected main." >&2
            exit 1
          fi

  python-compatibility:
    name: Python compatibility ${{ matrix.python-version }} / ${{ matrix.os }}
    runs-on: ${{ matrix.os }}
    timeout-minutes: 30
    needs: metadata
    strategy:
      fail-fast: false
      matrix:
        os:
          - ubuntu-latest
          - macos-14
          - macos-15
          - macos-26
          - windows-2025-vs2026
        python-version:
          - "3.10"
          - "3.11"
          - "3.12"
          - "3.13"
          - "3.14"
          - "3.x"
    steps:
      - name: Checkout
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7
        with:
          fetch-depth: 0

      - name: Set up Python
        uses: actions/setup-python@ece7cb06caefa5fff74198d8649806c4678c61a1 # v6
        with:
          python-version: ${{ matrix.python-version }}

      - name: Install dependencies
        run: |
          python -m pip install --no-cache-dir --upgrade pip
          python -m pip install --no-cache-dir --require-hashes -r requirements.lock
          python -m pip install --no-cache-dir --no-deps -e .

      - name: Verify Python and Tkinter fallback
        run: |
          python app.py --smoke-test
          python verify.py

  python-dist:
    name: Verify and build Python package
    runs-on: ubuntu-latest
    timeout-minutes: 30
    needs: metadata
    steps:
      - name: Checkout
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7
        with:
          fetch-depth: 0

      - name: Set up Python
        uses: actions/setup-python@ece7cb06caefa5fff74198d8649806c4678c61a1 # v6
        with:
          python-version: "3.14"

      - name: Install dependencies
        run: |
          python -m pip install --no-cache-dir --upgrade pip
          python -m pip install --no-cache-dir --require-hashes -r requirements.lock
          python -m pip install --no-cache-dir --no-deps -e .
          python -m pip install --no-cache-dir build

      - name: Verify Python and Tkinter fallback
        run: |
          python app.py --smoke-test
          python verify.py

      - name: Build Python distributions
        run: python -m build

      - name: Smoke install built wheel
        shell: bash
        env:
          EXPECTED_VERSION: ${{ needs.metadata.outputs.version }}
        run: |
          python scripts/verify_python_dist_artifacts.py --dist-dir dist --expected-version "${EXPECTED_VERSION}"
          python -m pip install --no-cache-dir --force-reinstall --no-deps "dist/market_sentinel-${EXPECTED_VERSION}-py3-none-any.whl"
          smoke_dir="$(mktemp -d)"
          cd "${smoke_dir}"
          market-sentinel --help >/dev/null
          python - <<'PY'
          import os
          from importlib.metadata import metadata, version
          from market_adapters import CryptoComPredictAdapter, build_default_registry

          assert version("market-sentinel") == os.environ["EXPECTED_VERSION"]
          package_metadata = metadata("market-sentinel")
          assert package_metadata["License-Expression"] == "0BSD"
          assert package_metadata.get_all("License-File") == ["LICENSE"]
          assert len(build_default_registry().list_market_ids()) == 41
          assert CryptoComPredictAdapter().market_id == "crypto_com_predict"
          PY

      - name: Upload Python distributions
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7
        with:
          name: python-dist
          path: dist/*
          if-no-files-found: error
          retention-days: 14

  frontend-dist:
    name: Build React production bundle
    runs-on: ubuntu-latest
    timeout-minutes: 20
    needs: metadata
    defaults:
      run:
        working-directory: frontend
    steps:
      - name: Checkout
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7
        with:
          fetch-depth: 0

      - name: Set up Node.js
        uses: actions/setup-node@820762786026740c76f36085b0efc47a31fe5020 # v7
        with:
          node-version: "24"

      - name: Install frontend dependencies
        shell: bash
        run: |
          if [ -f package-lock.json ]; then
            npm ci
          else
            npm install --no-audit --no-fund
          fi

      - name: Build React frontend
        run: npm run build

      - name: Create frontend zip
        shell: bash
        run: |
          python - <<'PY'
          from pathlib import Path
          from zipfile import ZIP_DEFLATED, ZipFile

          root = Path("dist")
          out = Path("../release-frontend-dist.zip")
          with ZipFile(out, "w", ZIP_DEFLATED) as archive:
              for path in sorted(root.rglob("*")):
                  if path.is_file():
                      archive.write(path, path.relative_to(root).as_posix())
          PY

      - name: Upload frontend distribution
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7
        with:
          name: frontend-dist-zip
          path: release-frontend-dist.zip
          if-no-files-found: error
          retention-days: 14

  windows-app:
    name: Build Windows EXE and MSI
    runs-on: windows-2025-vs2026
    timeout-minutes: 45
    environment: release
    needs:
      - metadata
      - frontend-dist
    steps:
      - name: Checkout
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7
        with:
          fetch-depth: 0

      - name: Set up Python
        uses: actions/setup-python@ece7cb06caefa5fff74198d8649806c4678c61a1 # v6
        with:
          python-version: "3.13"

      - name: Verify protected Windows signing configuration
        env:
          REQUIRE_WINDOWS_CODE_SIGNING: ${{ vars.REQUIRE_WINDOWS_CODE_SIGNING }}
          WINDOWS_CODE_SIGNING_CERTIFICATE_BASE64: ${{ secrets.WINDOWS_CODE_SIGNING_CERTIFICATE_BASE64 }}
          WINDOWS_CODE_SIGNING_CERTIFICATE_PASSWORD: ${{ secrets.WINDOWS_CODE_SIGNING_CERTIFICATE_PASSWORD }}
          WINDOWS_CODE_SIGNING_TIMESTAMP_URL: ${{ vars.WINDOWS_CODE_SIGNING_TIMESTAMP_URL }}
        shell: pwsh
        run: |
          $missing = [System.Collections.Generic.List[string]]::new()
          if ($env:REQUIRE_WINDOWS_CODE_SIGNING -cne "true") {
            $missing.Add("repository or release-environment variable REQUIRE_WINDOWS_CODE_SIGNING=true")
          }
          if ([string]::IsNullOrWhiteSpace($env:WINDOWS_CODE_SIGNING_CERTIFICATE_BASE64)) {
            $missing.Add("release-environment secret WINDOWS_CODE_SIGNING_CERTIFICATE_BASE64")
          }
          if ([string]::IsNullOrWhiteSpace($env:WINDOWS_CODE_SIGNING_CERTIFICATE_PASSWORD)) {
            $missing.Add("release-environment secret WINDOWS_CODE_SIGNING_CERTIFICATE_PASSWORD")
          }

          if ($missing.Count -eq 0) {
            try {
              $certificateBytes = [Convert]::FromBase64String($env:WINDOWS_CODE_SIGNING_CERTIFICATE_BASE64)
              $certificate = [System.Security.Cryptography.X509Certificates.X509Certificate2]::new(
                $certificateBytes,
                $env:WINDOWS_CODE_SIGNING_CERTIFICATE_PASSWORD,
                [System.Security.Cryptography.X509Certificates.X509KeyStorageFlags]::EphemeralKeySet
              )
              if (-not $certificate.HasPrivateKey) {
                $missing.Add("a PFX certificate with a private key")
              }
              $certificate.Dispose()
            } catch {
              $missing.Add("a valid password-protected PFX in WINDOWS_CODE_SIGNING_CERTIFICATE_BASE64")
            }
          }

          $timestampUrl = if ([string]::IsNullOrWhiteSpace($env:WINDOWS_CODE_SIGNING_TIMESTAMP_URL)) {
            "https://timestamp.digicert.com"
          } else {
            $env:WINDOWS_CODE_SIGNING_TIMESTAMP_URL
          }
          try {
            $timestampUri = [System.Uri]$timestampUrl
            if (-not $timestampUri.IsAbsoluteUri -or $timestampUri.Scheme -cne "https") {
              throw "timestamp URL must use HTTPS"
            }
          } catch {
            $missing.Add("an HTTPS WINDOWS_CODE_SIGNING_TIMESTAMP_URL")
          }

          if ($missing.Count -gt 0) {
            throw "Protected release signing preflight failed. Configure: " + ($missing -join "; ")
          }

      - name: Download frontend bundle
        uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8
        with:
          name: frontend-dist-zip
          path: release-inputs

      - name: Install Python build dependencies
        shell: pwsh
        run: |
          python -m pip install --no-cache-dir --upgrade pip
          python -m pip install --no-cache-dir --require-hashes -r requirements.lock
          python -m pip install --no-cache-dir --no-deps -e .
          python -m pip install --no-cache-dir -r requirements-build.txt

      - name: Install WiX Toolset
        shell: pwsh
        run: |
          $toolPath = "$env:USERPROFILE\.dotnet\tools"
          $env:PATH = "$toolPath;$env:PATH"
          $installedTools = dotnet tool list --global
          if ($installedTools -match '^\s*wix\s+') {
            dotnet tool uninstall --global wix
          }
          dotnet tool install --global wix --version 6.0.2
          $toolPath | Out-File -FilePath $env:GITHUB_PATH -Encoding utf8 -Append
          $wixVersion = wix --version
          if (-not ($wixVersion -like "6.0.2*")) {
            throw "Expected WiX Toolset 6.0.2, got $wixVersion"
          }
          $wixVersion

      - name: Build Windows portable zip and MSI
        shell: pwsh
        run: |
          python scripts/build_windows_release.py `
            --version "${{ needs.metadata.outputs.version }}" `
            --tag "${{ needs.metadata.outputs.tag_name }}" `
            --frontend-zip "release-inputs/release-frontend-dist.zip" `
            --output-dir "release-assets"

      - name: Sign Windows release packages
        env:
          WINDOWS_CODE_SIGNING_CERTIFICATE_BASE64: ${{ secrets.WINDOWS_CODE_SIGNING_CERTIFICATE_BASE64 }}
          WINDOWS_CODE_SIGNING_CERTIFICATE_PASSWORD: ${{ secrets.WINDOWS_CODE_SIGNING_CERTIFICATE_PASSWORD }}
          WINDOWS_CODE_SIGNING_TIMESTAMP_URL: ${{ vars.WINDOWS_CODE_SIGNING_TIMESTAMP_URL }}
        shell: pwsh
        run: |
          $targets = Get-ChildItem release-assets -File | Where-Object { $_.Extension -in '.exe', '.msi' }
          if (-not $targets) {
            throw "No Windows EXE or MSI files were produced for signing."
          }
          $arguments = @()
          foreach ($target in $targets) {
            $arguments += "--path"
            $arguments += $target.FullName
          }
          python scripts/sign_windows_release.py @arguments

      - name: Upload Windows release packages
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7
        with:
          name: windows-dist
          path: release-assets/*
          if-no-files-found: error
          retention-days: 14

  publish:
    name: Publish GitHub release
    runs-on: ubuntu-latest
    timeout-minutes: 15
    needs:
      - metadata
      - python-compatibility
      - python-dist
      - frontend-dist
      - windows-app
    environment: release
    permissions:
      attestations: write
      contents: write
      id-token: write
    steps:
      - name: Checkout
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7
        with:
          fetch-depth: 0

      - name: Set up Python for release metadata
        uses: actions/setup-python@ece7cb06caefa5fff74198d8649806c4678c61a1 # v6
        with:
          python-version: "3.14"

      - name: Download Python distributions
        uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8
        with:
          name: python-dist
          path: release-assets

      - name: Download frontend bundle
        uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8
        with:
          name: frontend-dist-zip
          path: release-assets

      - name: Download Windows packages
        uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8
        with:
          name: windows-dist
          path: release-assets

      - name: Normalize release asset names
        shell: bash
        run: |
          tag="${{ needs.metadata.outputs.tag_name }}"
          mv release-assets/release-frontend-dist.zip "release-assets/${APP_NAME}-${tag}-frontend-dist.zip"

      - name: Generate SPDX SBOM
        env:
          RELEASE_VERSION: ${{ needs.metadata.outputs.version }}
        run: |
          python scripts/generate_release_sbom.py \
            --version "${RELEASE_VERSION}" \
            --output "release-assets/${APP_NAME}-${RELEASE_VERSION}-sbom.spdx.json"

      - name: Generate checksums and release notes
        shell: bash
        run: |
          tag="${{ needs.metadata.outputs.tag_name }}"
          version="${{ needs.metadata.outputs.version }}"
          (
            cd release-assets
            sha256sum * > SHA256SUMS.txt
          )
          cat > RELEASE_NOTES.md <<EOF
          ## ${APP_NAME} ${tag}

          Automated release for \`${tag}\`.

          Verification performed in this workflow:
          - Python dependency installation and package import checks across Python 3.10 and newer, including the latest stable 3.x runner where available
          - Tkinter fallback smoke test
          - Full \`python verify.py\`
          - React production build
          - Python wheel/sdist build
          - Windows executable, portable zip, and MSI installer build
          - SHA256 checksum generation

          Assets:
          - Python wheel and source distribution
          - React production frontend zip
          - Windows x64 portable zip
          - Windows x64 MSI installer
          - SPDX JSON software bill of materials
          - \`SHA256SUMS.txt\`
          EOF

      - name: Verify final release assets
        shell: bash
        run: |
          python scripts/verify_release_assets.py \
            --asset-dir release-assets \
            --version "${{ needs.metadata.outputs.version }}" \
            --tag "${{ needs.metadata.outputs.tag_name }}"

      - name: Attest release assets
        uses: actions/attest-build-provenance@43d14bc2b83dec42d39ecae14e916627a18bb661 # v3
        with:
          subject-path: release-assets/*

      - name: Publish or update GitHub release
        env:
          GH_TOKEN: ${{ github.token }}
          TAG_NAME: ${{ needs.metadata.outputs.tag_name }}
          PRERELEASE: ${{ needs.metadata.outputs.prerelease }}
          DRAFT: ${{ needs.metadata.outputs.draft }}
        shell: bash
        run: |
          release_flags=()
          if [ "${PRERELEASE}" = "true" ]; then
            release_flags+=(--prerelease)
          fi
          if [ "${DRAFT}" = "true" ]; then
            release_flags+=(--draft)
          fi

          if gh release view "${TAG_NAME}" >/dev/null 2>&1; then
            gh release upload "${TAG_NAME}" release-assets/* --clobber
            gh release edit "${TAG_NAME}" --title "${TAG_NAME}" --notes-file RELEASE_NOTES.md "${release_flags[@]}"
          else
            gh release create "${TAG_NAME}" release-assets/* \
              --title "${TAG_NAME}" \
              --notes-file RELEASE_NOTES.md \
              --target "${GITHUB_SHA}" \
              "${release_flags[@]}"
          fi
