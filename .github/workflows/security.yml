name: Security

on:
  pull_request:
    branches:
      - main
      - master
  push:
    branches:
      - main
      - master
  schedule:
    - cron: "17 3 * * 1"
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: security-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: "true"

jobs:
  dependency-review:
    name: Dependency review
    if: github.event_name == 'pull_request'
    runs-on: ubuntu-latest
    timeout-minutes: 10
    permissions:
      contents: read
      pull-requests: read
    steps:
      - name: Detect dependency graph support
        id: dependency_graph
        env:
          GH_TOKEN: ${{ github.token }}
          DEPENDENCY_REVIEW_ENABLED: ${{ vars.DEPENDENCY_REVIEW_ENABLED }}
        shell: bash
        run: |
          graph_status="$(gh api "repos/${GITHUB_REPOSITORY}" --jq '.security_and_analysis.dependency_graph.status // "unknown"' 2>/dev/null || echo unknown)"
          if [ "${DEPENDENCY_REVIEW_ENABLED}" = "true" ] || [ "${graph_status}" = "enabled" ]; then
            echo "enabled=true" >> "${GITHUB_OUTPUT}"
            echo "Dependency review enabled; dependency_graph=${graph_status}."
          else
            echo "enabled=false" >> "${GITHUB_OUTPUT}"
            echo "Dependency review skipped; dependency_graph=${graph_status}. Enable GitHub dependency graph or set DEPENDENCY_REVIEW_ENABLED=true to force this check."
          fi

      - name: Checkout
        if: steps.dependency_graph.outputs.enabled == 'true'
        uses: actions/checkout@v7

      - name: Review dependency changes
        if: steps.dependency_graph.outputs.enabled == 'true'
        uses: actions/dependency-review-action@v5
        with:
          fail-on-severity: high
          comment-summary-in-pr: always

  codeql:
    name: CodeQL
    runs-on: ubuntu-latest
    timeout-minutes: 30
    permissions:
      actions: read
      contents: read
      security-events: write
    steps:
      - name: Checkout
        uses: actions/checkout@v7

      - name: Initialize CodeQL
        uses: github/codeql-action/init@v4
        with:
          languages: python,javascript-typescript

      - name: Analyze
        uses: github/codeql-action/analyze@v4
