version: 2

updates:
  - package-ecosystem: github-actions
    directory: /
    schedule:
      interval: weekly
      day: monday
      time: "04:00"
      timezone: Europe/Istanbul
    open-pull-requests-limit: 5
    groups:
      github-actions:
        patterns:
          - "*"

  - package-ecosystem: pip
    directory: /
    schedule:
      interval: weekly
      day: monday
      time: "04:20"
      timezone: Europe/Istanbul
    open-pull-requests-limit: 5
    groups:
      python-runtime:
        patterns:
          - "*"

  - package-ecosystem: npm
    directory: /frontend
    schedule:
      interval: weekly
      day: monday
      time: "04:40"
      timezone: Europe/Istanbul
    open-pull-requests-limit: 5
    groups:
      frontend-runtime:
        patterns:
          - "*"
